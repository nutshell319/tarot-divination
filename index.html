<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>塔罗牌占卜 — 探索你的内心世界</title>
<style>
/* ========== CSS Variables & Reset ========== */
:root {
  --bg: #08090d;
  --bg-cover: #070609;
  --purple: #b98eff;
  --accent: #e85d75;
  --text: #f6f2e8;
  --text-dim: #aaa59a;
  --text-muted: #746f66;
  --card-bg: #11131a;
  --card-border: #1e1f2a;
  --radius: 10px;
  --font: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; min-height:100vh;
  background:var(--bg); color:var(--text);
  font-family:var(--font); line-height:1.6;
  overflow-x:hidden;
}

/* ========== Background ========== */
body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.025;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 49px,rgba(255,255,255,.02) 50px),
    repeating-linear-gradient(90deg,transparent,transparent 49px,rgba(255,255,255,.02) 50px);
}

/* ========== Background Fool Silhouette ========== */
.bg-fool {
  position:fixed; z-index:0; pointer-events:none;
  bottom:0; left:50%; transform:translateX(-50%);
  width:min(400px, 88vw); height:min(560px, 72vh);
  opacity:0.035; filter:blur(.5px);
  animation: foolBreathe 8s ease-in-out infinite;
}
@keyframes foolBreathe {
  0%, 100% { opacity:0.025; }
  50% { opacity:0.055; }
}

/* ========== App Container ========== */
.app-container {
  position:relative; z-index:1;
  max-width:1100px; margin:0 auto; padding:40px 24px 80px;
  min-height:100vh; display:flex; flex-direction:column;
}

/* ========== Header ========== */
.app-header {
  text-align:center; padding:32px 0 12px;
}
.app-header h1 {
  font-size:2rem; font-weight:700; color:var(--purple); letter-spacing:2px;
}
.app-header .subtitle {
  font-size:.9rem; color:var(--text-dim); margin-top:6px; letter-spacing:1px;
}
.divider {
  width:60px; height:2px; background:var(--purple); margin:16px auto 0; border-radius:1px;
}

/* ========== Stage Display ========== */
.stage { display:none; flex-direction:column; align-items:center; flex:1; }
.stage.active { display:flex; }

/* ========== Welcome Stage ========== */
.welcome-content {
  text-align:center; padding:40px 20px; max-width:600px;
}
.welcome-content .icon-main {
  font-size:4rem; margin-bottom:20px; opacity:.9;
}
.welcome-content h2 {
  font-size:1.5rem; color:var(--text); margin-bottom:12px;
}
.welcome-content p {
  color:var(--text-dim); font-size:.95rem; margin-bottom:8px; line-height:1.8;
}
.welcome-content .features {
  display:flex; gap:20px; justify-content:center; flex-wrap:wrap; margin:28px 0;
}
.welcome-content .feature-item {
  background:var(--card-bg); border:1px solid var(--card-border);
  border-radius:var(--radius); padding:16px 20px; text-align:center; min-width:100px;
}
.welcome-content .feature-item .fi-icon { font-size:1.8rem; margin-bottom:6px; }
.welcome-content .feature-item .fi-label { font-size:.8rem; color:var(--text-dim); }

/* ========== Buttons ========== */
.btn {
  display:inline-flex; align-items:center; gap:8px;
  padding:12px 32px; border-radius:var(--radius); font-size:.95rem;
  font-family:var(--font); cursor:pointer; transition:all .25s;
  border:none; letter-spacing:1px; text-decoration:none;
}
.btn-primary {
  background:var(--purple); color:#0a0a0f; font-weight:600;
}
.btn-primary:hover { background:#c9a3ff; transform:translateY(-1px); box-shadow:0 4px 20px rgba(185,142,255,.25); }
.btn-outline {
  background:transparent; border:1px solid var(--purple); color:var(--purple);
}
.btn-outline:hover { background:rgba(185,142,255,.08); }
.btn-accent {
  background:var(--accent); color:#fff; font-weight:600;
}
.btn-accent:hover { background:#f06d82; transform:translateY(-1px); box-shadow:0 4px 20px rgba(232,93,117,.25); }
.btn-sm { padding:8px 20px; font-size:.85rem; }
.btn:disabled { opacity:.4; cursor:not-allowed; pointer-events:none; }

/* ========== Scenario Cards ========== */
.scenario-grid {
  display:grid; grid-template-columns:repeat(3, 1fr);
  gap:16px; max-width:800px; width:100%; margin:20px 0;
}
@media (max-width:700px) { .scenario-grid { grid-template-columns:repeat(2, 1fr); } }
.scenario-card {
  background:var(--card-bg); border:1px solid var(--card-border);
  border-radius:var(--radius); padding:24px 16px; text-align:center;
  cursor:pointer; transition:all .3s; position:relative;
}
.scenario-card:hover {
  border-color:var(--purple); transform:translateY(-2px);
  box-shadow:0 8px 30px rgba(185,142,255,.1);
}
.scenario-card.selected {
  border-color:var(--purple);
  box-shadow:0 0 0 2px rgba(185,142,255,.25);
}
.scenario-card .sc-icon { font-size:2.2rem; margin-bottom:10px; }
.scenario-card .sc-name { font-size:.95rem; font-weight:600; color:var(--text); }
.scenario-card .sc-desc { font-size:.78rem; color:var(--text-dim); margin-top:4px; }
.scenario-card .sc-check {
  position:absolute; top:8px; right:10px; width:20px; height:20px;
  border-radius:50%; background:var(--purple); color:#0a0a0f;
  display:none; align-items:center; justify-content:center; font-size:12px;
}
.scenario-card.selected .sc-check { display:flex; }

/* ========== Spread Selection ========== */
.spread-list { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; margin:20px 0; }
.spread-option {
  background:var(--card-bg); border:1px solid var(--card-border);
  border-radius:var(--radius); padding:20px 24px; cursor:pointer;
  transition:all .3s; text-align:center; min-width:160px; max-width:220px;
}
.spread-option:hover { border-color:var(--purple); }
.spread-option.selected { border-color:var(--purple); box-shadow:0 0 0 2px rgba(185,142,255,.25); }
.spread-option .sp-icon { font-size:1.6rem; margin-bottom:8px; }
.spread-option .sp-name { font-weight:600; color:var(--text); font-size:.9rem; }
.spread-option .sp-cards { font-size:.78rem; color:var(--text-dim); margin-top:4px; }
.spread-option .sp-use { font-size:.75rem; color:var(--text-muted); margin-top:6px; }

/* ========== Draw Stage ========== */
.draw-area { text-align:center; padding:20px 0; }
.draw-area .draw-prompt { font-size:1.1rem; color:var(--text-dim); margin-bottom:8px; }
.draw-area .draw-instruction { font-size:.85rem; color:var(--text-muted); margin-bottom:24px; }

/* Shuffle animation */
.shuffle-area {
  position:relative; width:150px; height:210px; margin:0 auto 24px;
}
.shuffle-card {
  position:absolute; width:150px; height:210px;
  background:var(--card-bg); border:2px solid var(--purple);
  border-radius:12px; transition:all .5s cubic-bezier(.22,1,.36,1);
}
@keyframes shuffleAnim {
  0% { transform:translateX(0) rotate(0); }
  20% { transform:translateX(-40px) rotate(-8deg); }
  40% { transform:translateX(30px) rotate(5deg); }
  60% { transform:translateX(-20px) rotate(-3deg); }
  80% { transform:translateX(10px) rotate(2deg); }
  100% { transform:translateX(0) rotate(0); }
}
.shuffle-card.animating { animation:shuffleAnim 1.2s ease-in-out; }

/* ========== Tarot Card Component ========== */
.tarot-card {
  width:150px; height:225px; perspective:1000px; cursor:pointer;
  transition:transform .3s;
}
.tarot-card:hover { transform:translateY(-4px); }
.tarot-card.flipped { cursor:default; }
.tarot-card.flipped:hover { transform:none; }

.tarot-card .card-inner {
  position:relative; width:100%; height:100%;
  transition:transform .8s cubic-bezier(.4,0,.2,1);
  transform-style:preserve-3d;
}
.tarot-card.flipped .card-inner { transform:rotateY(180deg); }

.tarot-card .card-face {
  position:absolute; inset:0; backface-visibility:hidden;
  border-radius:12px; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  border:2px solid var(--card-border);
}

/* Card Back */
.card-back {
  background:linear-gradient(135deg, #14101f 0%, #1a1430 50%, #14101f 100%);
  border-color:#2a2540 !important;
}
.card-back .back-pattern {
  width:90px; height:90px; border:2px solid #3a3060; border-radius:50%;
  display:flex; align-items:center; justify-content:center; position:relative;
}
.card-back .back-pattern::before {
  content:''; position:absolute; width:70px; height:70px;
  border:1px solid #4a3d70; border-radius:50%;
}
.card-back .back-star {
  font-size:2rem; color:var(--purple); opacity:.7;
}
.card-back .back-dots {
  position:absolute; inset:16px;
  display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr;
  place-items:center;
}
.card-back .back-dots span {
  width:4px; height:4px; background:var(--purple); border-radius:50%; opacity:.4;
}
.card-back .back-corner {
  position:absolute; font-size:10px; color:var(--purple); opacity:.3;
}
.card-back .bc-tl { top:10px; left:12px; }
.card-back .bc-tr { top:10px; right:12px; }
.card-back .bc-bl { bottom:10px; left:12px; }
.card-back .bc-br { bottom:10px; right:12px; }

/* Card Front */
.card-front {
  background:linear-gradient(180deg, #15111f 0%, #1c1630 100%);
  transform:rotateY(180deg); padding:16px 12px; justify-content:flex-start;
}
.card-front.major { border-color:#5a4080; }
.card-front.wands { border-color:#8b4513; }
.card-front.cups { border-color:#2e6b8f; }
.card-front.swords { border-color:#6b8fa0; }
.card-front.pentacles { border-color:#5a7a4a; }

.card-front .cf-number {
  font-size:.7rem; color:var(--text-muted); letter-spacing:2px; margin-bottom:4px;
}
.card-front .cf-name {
  font-size:.95rem; font-weight:700; color:var(--text); margin-bottom:2px;
}
.card-front .cf-en {
  font-size:.7rem; color:var(--text-dim); margin-bottom:12px; font-style:italic;
}
.card-front .cf-symbol {
  font-size:2.4rem; margin-bottom:10px; opacity:.85;
}
.card-front .cf-keywords {
  font-size:.7rem; color:var(--text-dim); text-align:center; line-height:1.5;
}
.card-front .cf-reversed-badge {
  display:none; margin-top:8px; padding:3px 10px; border-radius:20px;
  background:rgba(232,93,117,.15); color:var(--accent); font-size:.7rem;
}
.card-front.reversed .cf-reversed-badge { display:inline-block; }
.card-front.reversed .cf-name { color:var(--accent); }

/* Card spread layout */
.cards-row {
  display:flex; gap:24px; flex-wrap:wrap; justify-content:center; align-items:flex-start;
}
.cards-col { display:flex; flex-direction:column; align-items:center; gap:12px; }
.card-position-label {
  font-size:.75rem; color:var(--text-muted); text-align:center; max-width:150px;
  margin-bottom:4px; letter-spacing:1px;
}
.card-position-label strong { color:var(--purple); display:block; font-size:.8rem; }

/* Relationship spread */
.spread-relation {
  display:flex; flex-direction:column; align-items:center; gap:30px;
}
.spread-relation .relation-parties {
  display:flex; gap:60px; flex-wrap:wrap; justify-content:center;
}
.spread-relation .relation-party { text-align:center; }
.spread-relation .relation-party h4 {
  font-size:.9rem; color:var(--purple); margin-bottom:16px; letter-spacing:2px;
}
.spread-relation .relation-outcome { text-align:center; }

/* ========== Reading Panel ========== */
.reading-panel {
  background:var(--card-bg); border:1px solid var(--card-border);
  border-radius:var(--radius); padding:24px; max-width:700px; width:100%;
  margin-top:28px;
}
.reading-panel h3 {
  font-size:1.1rem; color:var(--purple); margin-bottom:8px;
}
.reading-panel .reading-text {
  font-size:.9rem; color:var(--text-dim); line-height:1.8;
}
.reading-panel .reading-highlight {
  color:var(--accent); font-weight:600;
}

/* ========== Section Title ========== */
.section-title {
  font-size:1.2rem; color:var(--purple); text-align:center; margin-bottom:8px;
}
.section-desc {
  font-size:.85rem; color:var(--text-dim); text-align:center; margin-bottom:20px;
}

/* ========== Back Link ========== */
.back-link {
  display:inline-flex; align-items:center; gap:6px;
  color:var(--text-muted); font-size:.85rem; cursor:pointer;
  margin-bottom:20px; transition:color .2s;
}
.back-link:hover { color:var(--purple); }

/* ========== Footer ========== */
.app-footer {
  text-align:center; padding:24px; color:var(--text-muted); font-size:.75rem;
  margin-top:auto;
}

/* ========== Animations ========== */
@keyframes fadeInUp {
  from { opacity:0; transform:translateY(20px); }
  to { opacity:1; transform:translateY(0); }
}
.fade-in { animation:fadeInUp .6s ease-out both; }
.fade-in-d1 { animation-delay:.1s; }
.fade-in-d2 { animation-delay:.2s; }
.fade-in-d3 { animation-delay:.3s; }
.fade-in-d4 { animation-delay:.4s; }
.fade-in-d5 { animation-delay:.5s; }

@keyframes cardDeal {
  from { opacity:0; transform:translateY(-60px) scale(.6) rotateY(180deg); }
  to { opacity:1; transform:translateY(0) scale(1) rotateY(0); }
}
.card-deal { animation:cardDeal .7s cubic-bezier(.22,1,.36,1) both; }

/* ========== Toast ========== */
.toast {
  position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:200;
  padding:10px 24px; border-radius:var(--radius); font-size:.85rem;
  background:var(--purple); color:#0a0a0f; letter-spacing:1px;
  opacity:0; transition:opacity .3s;
}
.toast.show { opacity:1; }

/* ========== Responsive ========== */
@media (max-width:600px) {
  .app-container { padding:20px 12px 60px; }
  .app-header h1 { font-size:1.4rem; }
  .tarot-card { width:120px; height:180px; }
  .shuffle-area { width:120px; height:180px; }
  .shuffle-card { width:120px; height:180px; }
  .cards-row { gap:12px; }
  .card-position-label { max-width:120px; font-size:.7rem; }
  .card-position-label strong { font-size:.73rem; }
  .card-front .cf-name { font-size:.8rem; }
  .card-front .cf-symbol { font-size:1.8rem; }
  .card-front .cf-keywords { font-size:.65rem; }
  .spread-relation .relation-parties { gap:20px; }
}
</style>
</head>

<div class="app-container" id="app">

  <!-- Header -->
  <header class="app-header">

          <div class="fi-icon">✨</div>

};
const COURT_KEYS = ['page','knight','queen','king'];

// ==================== DECK MANAGEMENT ====================
function buildDeck() {
  const deck = [];
  MAJOR_ARCANA.forEach(c => deck.push({
    ...c, type:'major', suit:null, number:parseInt(c.id)
  }));
  Object.entries(MINOR_ARCANA).forEach(([suitKey, suitData]) => {
    // Numbered cards
    Object.entries(suitData.cards).forEach(([num, card]) => {
      deck.push({
        id: 22 + deck.length,
        n:String(num),
        name:card.name,
        en:`${num} of ${suitData.suit}`,
        type:'minor', suit:suitKey, number:parseInt(num),
        up:card.up, rev:card.rev,
        sym:suitData.sym, el:suitData.el, pl:'',
        kw:suitData.domain
      });
    });
    // Court cards
    COURT_KEYS.forEach((ck, i) => {
      const cm = COURT_MEANINGS[ck];
      deck.push({
        id: 22 + deck.length,
        n:['P','Kn','Q','K'][i],
        name:`${suitData.suit}${cm.role}`,
        en:`${cm.role} of ${suitData.suit}`,
        type:'minor', suit:suitKey, number:11+i, isCourt:true,
        up:cm.up, rev:cm.rev,
        sym:suitData.sym, el:suitData.el, pl:'',
        kw:suitData.domain
      });
    });
  });
  return deck;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function drawCards(n) {
  const deck = shuffle(buildDeck());
  return deck.slice(0, n).map(c => ({
    ...c,
    reversed: Math.random() < 0.45 // 45% chance reversed
  }));
}

function getPositionAdvice(spread, idx, card) {
  const pos = spread.positions[idx];
  if (pos.includes('过去')) return '反思这段经历带来了什么智慧。';
  if (pos.includes('现在') || pos.includes('当下') || pos.includes('现状')) return '这是你当前需要正视的核心能量。';
  if (pos.includes('未来') || pos.includes('走向') || pos.includes('结果')) return '这并非注定的结局——你的行动可以改变趋势。';
  if (pos.includes('挑战') || pos.includes('障碍')) return '这是成长必须跨越的门槛，而非不可战胜的敌人。';
  if (pos.includes('感受')) return '关注真实的情感流动，而非"应该"的感受。';
  if (pos.includes('想法')) return '审视这些想法是来自理性还是恐惧。';
  if (pos.includes('行为')) return '行动比言语更有说服力——你实际在做什么？';
  if (pos.includes('根基') || pos.includes('潜意识')) return '这可能是你尚未意识到的深层驱动力量。';
  if (pos.includes('远景')) return '这个愿景值得追求，但需要脚踏实地的步骤。';
  if (card.reversed) return '逆位提示你：这部分能量需要向内审视或重新调整。';
  return '让这张牌的能量与你正在探索的问题产生共鸣。';
}

function analyzeCardPair(c1, c2, pairType) {
  // pairType: 'flow'(c1→c2时间流), 'cross'(交叉对比), 'challenge'(c1被c2挑战)
  let parts = [];

  // 1. 类型共振
  if (c1.type === 'major' && c2.type === 'major') {
    parts.push(`两张大阿卡纳相遇，提示这个转折点具有<span style="color:var(--accent);">超越日常的深层意义</span>——不是偶然的碰撞，而是灵魂旅程中的关键路标。`);
  } else if (c1.type === 'major' && c2.type === 'minor') {
    parts.push(`大阿卡纳「${c1.name}」为小阿卡纳「${c2.name}」提供了<span style="color:var(--purple);">更大的叙事背景</span>——日常的具体事务中，藏着一个更深的课题。`);
  } else if (c1.type === 'minor' && c2.type === 'major') {
    parts.push(`从小阿卡纳「${c1.name}」走向大阿卡纳「${c2.name}」——具体的生活细节正在<span style="color:var(--purple);">升华成人生的重要启示</span>。`);
  }

  // 2. 元素互动
  const elRel = elementsHarmonize(c1.el, c2.el);
  if (elRel === 'resonance') {
    parts.push(`同为${c1.el}元素，两股能量<span style="color:var(--accent);">同频共振</span>——${EL_DESC[c1.el].trait}的领域被加倍强调。`);
  } else if (elRel === 'flow') {
    parts.push(`${c1.el}生${c2.el}——元素流转是<span style="color:var(--purple);">顺畅的</span>，前一张牌的能量自然滋养后一张牌的生长。`);
  } else if (elRel === 'tension') {
    parts.push(`${c1.el}与${c2.el}元素之间存在<span style="color:var(--accent);">内在张力</span>——这不是坏信号，而是提醒你：两个领域需要被同时看见和调和。`);
  }

  // 3. 数字关系
  if (c1.number !== undefined && c2.number !== undefined) {
    const diff = Math.abs(c2.number - c1.number);
    if (c1.number === c2.number && c1.type==='minor' && c2.type==='minor' && c1.suit !== c2.suit) {
      parts.push(`更微妙的是，两者数字相同（${c1.number}），但花色不同——提示<span style="color:var(--purple);">同一个命题在不同生活领域中的不同呈现</span>，值得交叉思考。`);
    } else if (diff === 1) {
      parts.push(`数字从${c1.number}到${c2.number}的递进暗示着<span style="color:var(--purple);">一个自然的演化过程</span>——每一个阶段都为下一阶段铺路。`);
    } else if (diff >= 5) {
      parts.push(`数字从${c1.number}跃迁到${c2.number}，跨度较大——提示这个转变可能不是渐进的，而是<span style="color:var(--accent);">一次跳跃式的发展</span>。`);
    }
  }

  // 4. 正逆位互动
  if (c1.reversed && !c2.reversed) {
    parts.push(`从逆位到正位——能量正在疏通。曾经的卡点正在转化，内在的功课正在外显为可见的行动。`);
  } else if (!c1.reversed && c2.reversed) {
    parts.push(`从正位到逆位——提示你需要<span style="color:var(--accent);">暂停并向内看</span>。外在的顺畅遇到了需要内部重新校准的信号。`);
  } else if (c1.reversed && c2.reversed) {
    parts.push(`两张牌均为逆位——这不是双倍的困境，而是<span style="color:var(--purple);">双倍的向内邀请</span>。答案不在前进中，在回望和整合中。`);
  }

  return parts.length > 0 ? parts.join('<br>') : '';
}

// 分析三张牌的数字趋势
function analyzeNumberSequence(cards) {
  const nums = cards.map(c => c.number).filter(n => n !== undefined);
  if (nums.length < 2) return '';
  const trend = nums[nums.length-1] - nums[0];
  if (trend > 3) return `数字整体呈上升趋势，提示这是一个<span style="color:var(--accent);">成长与扩展</span>的周期。`;
  if (trend < -3) return `数字整体下降，提示这是一个<span style="color:var(--purple);">回归本质与简化</span>的阶段——少即是多。`;
  if (Math.abs(trend) <= 2) return `数字波动平缓，提示当前处于<span style="color:var(--purple);">稳定过渡</span>期——重大转变在酝酿中，但表面相对平静。`;
  return '';
}

// ==================== FINAL SUMMARY ENGINE ====================
function buildFinalSummary() {
  const cards = state.cards;
  const sp = SPREADS[state.spread];
  const sc = SCENARIOS.find(s => s.id === state.scenario);

  // --- Element distribution ---
  const elCount = { '火':0, '水':0, '风':0, '土':0 };
  const elCards = { '火':[], '水':[], '风':[], '土':[] };
  cards.forEach(c => {
    if (elCount[c.el] !== undefined) { elCount[c.el]++; elCards[c.el].push(c); }
  });
  const sortedEls = Object.entries(elCount).sort((a,b) => b[1]-a[1]);
  const dominantEl = sortedEls[0];
  const secondEl = sortedEls[1];
  const missingEls = sortedEls.filter(e => e[1] === 0).map(e => e[0]);

  // --- Major/Minor ---
  const majors = cards.filter(c => c.type === 'major');
  const minors = cards.filter(c => c.type === 'minor');
  const majorRatio = majors.length / cards.length;

  // --- Reversal ---
  const uprights = cards.filter(c => !c.reversed);
  const reversals = cards.filter(c => c.reversed);
  const revRatio = reversals.length / cards.length;

  // --- Suit ---
  const suitMap = { wands:'权杖', cups:'圣杯', swords:'宝剑', pentacles:'星币' };
  const suitCount = {};
  minors.forEach(c => { const k = c.suit; if (k) suitCount[k] = (suitCount[k]||0)+1; });
  const dominantSuit = Object.entries(suitCount).sort((a,b) => b[1]-a[1])[0];

  // --- Numerology ---
  const totalNum = cards.reduce((sum, c) => sum + (c.number||0), 0);
  const numerCore = totalNum % 10 || 10; // 简化到1-10

  // ===== 1. OVERVIEW =====
  let overview = '';
  const scName = sc ? sc.name : '你的问题';

  overview += `<span style="color:var(--text);">本次占卜聚焦于</span><span class="reading-highlight">「${scName}」</span><span style="color:var(--text);">，共抽取 ${cards.length} 张牌：</span>`;

  // 牌面简要一览
  overview += `<br><br><span style="color:var(--text-dim);">牌面一览：</span>`;
  cards.forEach((c, i) => {
    const orient = c.reversed ? '逆' : '正';
    const majorMark = c.type === 'major' ? '★' : '';
    overview += `<span style="color:${c.reversed?'var(--accent)':'var(--purple)'};font-size:.9rem;">${majorMark}${c.name}（${orient}）</span>`;
    if (i < cards.length - 1) overview += ' → ';
  });

  // 是否有"信号牌"（强烈提示性的牌）
  const signalCards = cards.filter(c =>
    c.name === '高塔' || c.name === '死神' || c.name === '审判' ||
    c.name === '命运之轮' || c.name === '月亮' || c.name === '太阳' ||
    c.name === '世界' || c.name === '恶魔' || c.name === '星星'
  );
  if (signalCards.length > 0) {
    overview += `<br><br>🔔 <span style="color:var(--accent);">本次出现了具有强烈信号意义的牌：</span>`;
    signalCards.forEach(sc => {
      let signal = '';
      if (sc.name === '高塔') signal = '高塔预示某个旧结构需要崩塌才能重建——不要恐惧瓦解，它解放了你。';
      else if (sc.name === '死神') signal = '死神标志着一个阶段的彻底终结——旧的不去，新的不来，这是蜕变的邀请函。';
      else if (sc.name === '审判') signal = '审判召唤你回应内在的使命——是时候清算旧账，迎接觉醒了。';
      else if (sc.name === '命运之轮') signal = '命运之轮正在转动——你正处在关键的转折点上，顺势比对抗更明智。';
      else if (sc.name === '月亮') signal = '月亮照亮了潜意识中隐藏的角落——此刻的迷茫其实是深度自我认知的前奏。';
      else if (sc.name === '太阳') signal = '太阳带来了最明亮的祝福——真相、快乐和成功正在照耀你的路。';
      else if (sc.name === '世界') signal = '世界标志着一个圆满的完成——一段旅程走到了终点，新的旅程即将启程。';
      else if (sc.name === '恶魔') signal = '恶魔提醒你审视自己的枷锁——你真的被束缚了，还是只是以为自己被束缚？';
      else if (sc.name === '星星') signal = '星星带来了暴风雨后的宁静与希望——疗愈正在进行，宇宙从未放弃你。';
      overview += `<br>· ${signal}`;
    });
  }

  // Energy analysis
  overview += `<br><br><span style="color:var(--purple);font-weight:600;">能量格局</span><br>`;
  if (dominantEl[1] >= secondEl[1] + 2) {
    overview += `${EL_DESC[dominantEl[0]].trait}的议题是当前最突出的能量信号。当${dominantEl[0]}元素一枝独秀时——`;
    overview += `一方面你有充足的${EL_DESC[dominantEl[0]].name}能量可供使用，`;
    overview += `另一方面要警惕${EL_DESC[dominantEl[0]].excess}的倾向。`;
  } else if (dominantEl[1] === secondEl[1] && dominantEl[1] > 0) {
    overview += `${dominantEl[0]}与${secondEl[0]}元素并驾齐驱——你正在${EL_DESC[dominantEl[0]].trait}与${EL_DESC[secondEl[0]].trait}之间`;
    if (elementsHarmonize(dominantEl[0], secondEl[0]) === 'tension') {
      overview += `<span style="color:var(--accent);">寻找一种创造性的张力平衡</span>——这两股力量看似矛盾，实则可以形成互补的完整视角。`;
    } else {
      overview += `感受协同的力量——这两股能量相互加持，指向一个更立体的成长方向。`;
    }
  } else {
    overview += `各元素能量相对均衡，提示当前生活各领域都在协调运转之中。这种平衡本身值得珍惜——它不是平庸，而是成熟的整合。`;
  }

  // Missing element warning
  if (missingEls.length > 0 && cards.length >= 3) {
    overview += `<br><br>⚠️ 注意：<span style="color:var(--text-muted);">${missingEls.map(e => EL_DESC[e].name + '元素').join('、')}在本次牌阵中</span><span style="color:var(--accent);">完全缺席</span>——`;
    overview += missingEls.map(e => EL_DESC[e].lack).join('；') + '。这可能正是你需要刻意关注的盲区。';
  }

  // Major Arcana
  if (majorRatio >= 0.5) {
    overview += `<br><br>🌟 牌阵中<span class="reading-highlight">大阿卡纳占 ${Math.round(majorRatio*100)}%</span>——这不是日常琐事的占卜，而是命运层面的对话。`;
    const majorNames = majors.map(c => '「' + c.name + '」').join('、');
    overview += `${majorNames} ${majors.length>1?'联手':'单独'}向你传达了超越个人意识的智慧。`;
  } else if (majorRatio === 0) {
    overview += `<br><br>全为小阿卡纳，说明焦点在日常实践层面——`;
    if (dominantSuit) { const sEl = {wands:'火',cups:'水',swords:'风',pentacles:'土'}[dominantSuit[0]]||'火'; overview += `其中<span class="reading-highlight">「${suitMap[dominantSuit[0]]}」花色最为突出</span>，围绕${EL_DESC[sEl]?.trait||'相关'}议题展开。`; }
    overview += `处理好眼前的具体事务，就是此刻最好的修行。`;
  }

  // Reversal
  if (revRatio > 0.5) {
    overview += `<br><br>🔄 超半数牌逆位（${reversals.length}/${cards.length}）——能量整体向内回旋。这不是"运气不好"，而是一个<span style="color:var(--accent);">深度整合的时期</span>。`;
  } else if (revRatio > 0) {
    overview += `<br><br>大部分正位（${uprights.length}/${cards.length}），整体能量顺畅。`;
    if (reversals.length === 1) overview += `唯一逆位牌「${reversals[0].name}」标记了最需要你内在功课的具体领域。`;
    else overview += `${reversals.length}张逆位牌指明了需要额外留意的局部卡点。`;
  } else {
    overview += `<br><br>✨ 全正位——能量畅通无阻，是一个难得的天时地利阶段。但正位不代表自动成功，行动仍然是变现牌面能量的关键。`;
  }

  // ===== 2. NARRATIVE =====
  let narrative = '';

  // 通用：数字学总结
  if (cards.length >= 2) {
    const numSeq = analyzeNumberSequence(cards);
    if (numSeq) narrative += `📐 <span style="color:var(--text-dim);">数字趋势：</span>${numSeq}<br><br>`;
  }

  // --- 按牌阵类型展开 ---
  if (sp === SPREADS.triple) {
    const [past, now, future] = cards;

    narrative += `<span style="color:var(--purple);font-weight:600;">▸ 时间流分析</span><br>`;
    narrative += `从「${past.name}」→「${now.name}」→「${future.name}」构成的时空线上——<br><br>`;

    // Past→Now pair
    narrative += `<span style="color:var(--text-dim);">🔗 过去→现在：</span><br>`;
    narrative += analyzeCardPair(past, now, 'flow') || '两段能量平稳衔接，过去的经验正在当下自然发酵。<br>';
    narrative += `<br>`;

    // Now→Future pair
    narrative += `<span style="color:var(--text-dim);">🔗 现在→未来：</span><br>`;
    narrative += analyzeCardPair(now, future, 'flow') || '当下的选择将直接塑造未来的走向——每一刻的觉察都在改写明天的剧本。<br>';
    narrative += `<br>`;

    // 三牌整体叙事
    narrative += `<span style="color:var(--text-dim);">📖 整体叙事：</span><br>`;
    if (!past.reversed && !now.reversed && !future.reversed) {
      narrative += `这是一条<span style="color:var(--accent);">全正向的能量弧线</span>——从过去的积累、到当下的觉醒、走向未来的成果。你正处于顺势而上的阶段，牌面鼓励你坚定前行。`;
    } else if (past.reversed && !now.reversed && !future.reversed) {
      narrative += `这是一个<span style="color:var(--accent);">走出低谷、持续上升</span>的故事。过去的逆位不会定义你——它只是故事第一章的铺垫。现在的你已经掌握了主动性。`;
    } else if (past.reversed && now.reversed && !future.reversed) {
      narrative += `过去和当下都在调整中，但未来亮出了正向信号——这说明<span style="color:var(--accent);">转折点就在前方</span>，此刻的困境正是蜕变前的阵痛。`;
    } else if (!past.reversed && !now.reversed && future.reversed) {
      narrative += `过去和现在都很顺畅，但未来出现了逆位信号——这不意味着会失败，而是<span style="color:var(--accent);">一个重要的"检查点"</span>：你需要重新审视当前的路径是否真的指向你想去的地方。`;
    } else if (past.reversed && now.reversed && future.reversed) {
      narrative += `三张牌均为逆位——这不是绝望的信号，而是一个<span style="color:var(--accent);">彻底向内看的邀请</span>。做减法重于做加法。`;

      narrative += `正逆交错的时间线说明你正处在一个<span style="color:var(--purple);">非线性的成长阶段</span>——退一步不一定就是退步，可能是为更好的跳跃蓄力。`;
    }

  } else if (sp === SPREADS.relation) {
    const youCards = cards.slice(0,3), themCards = cards.slice(3,6), outcome = cards[6];
    const youRevs = youCards.filter(c=>c.reversed).length;
    const themRevs = themCards.filter(c=>c.reversed).length;

    narrative += `<span style="color:var(--purple);font-weight:600;">▸ 你的内在拼图</span><br>`;
    narrative += `感受「${youCards[0].name}」→ 想法「${youCards[1].name}」→ 行为「${youCards[2].name}」<br>`;
    // Check alignment
    if (youCards[0].el === youCards[1].el && youCards[1].el === youCards[2].el) {
      narrative += `三牌同属${youCards[0].el}元素——你的感受、想法和行为<span style="color:var(--accent);">高度一致</span>，内在没有明显的分裂。`;
    } else if (youCards[0].el !== youCards[1].el && youCards[0].el !== youCards[2].el && youCards[1].el !== youCards[2].el) {
      narrative += `三牌分属三种元素——你的内在世界<span style="color:var(--accent);">正在经历丰富的多维运作</span>，不同层面在各自消化这段关系。`;
    } else {
      narrative += `你的${youCards[0].el}元素感受与${youCards[1].el}元素想法之间存在<span style="color:var(--purple);">跨元素对话</span>——`;
      if (elementsHarmonize(youCards[0].el, youCards[1].el) === 'tension') {
        narrative += `你感受到的和你想的可能不完全一致，这是正常的内在张力。`;
      } else {
        narrative += `你的情感和理智在同一个方向上，形成了有力的内在支持。`;
      }
    }
    if (youRevs >= 2) narrative += `<br>较多逆位提示你的内在还有未处理的情绪需要被自己先看见。`;
    narrative += `<br><br>`;

    narrative += `<span style="color:var(--purple);font-weight:600;">▸ 对方的内在拼图</span><br>`;
    narrative += `感受「${themCards[0].name}」→ 想法「${themCards[1].name}」→ 行为「${themCards[2].name}」<br>`;

    else if (themRevs === 0) narrative += `对方的能量相对明朗清晰。`;
    else narrative += `对方存在局部的矛盾需要自身消化。`;
    narrative += `<br><br>`;

    narrative += `<span style="color:var(--text-dim);">🔗 双方能量交汇：</span><br>`;
    // Compare feeling→feeling, thought→thought, action→action
    if (youCards[0].suit === themCards[0].suit && youCards[0].type==='minor') {
      narrative += `两人的感受层同属${suitMap[youCards[0].suit]}花色——在情感层面，你们<span style="color:var(--accent);">共享相似的频道</span>，这为深度理解奠定了基础。<br>`;
    }
    if (youCards[2].suit === themCards[2].suit && youCards[2].type==='minor') {
      narrative += `双方的行为牌花色一致——你们的行动模式<span style="color:var(--purple);">有天然的默契</span>。<br>`;
    }
    if (youRevs > themRevs + 1) {
      narrative += `你的内在波动明显大于对方——这可能让关系中出现<span style="color:var(--accent);">付出感的不对等</span>。在被理解之前，先理解自己的需求。`;
    } else if (themRevs > youRevs + 1) {
      narrative += `对方的内在波动明显大于你——此时<span style="color:var(--purple);">你的稳定可以成为关系的锚点</span>，但不要替他承担应该自己面对的课题。`;
    } else {
      narrative += `两人的能量状态接近——关系处于一个<span style="color:var(--purple);">自然平衡</span>的状态，双方在相似的频率上共振。`;
    }
    narrative += `<br><br>`;

    narrative += `<span style="color:var(--text-dim);">📖 关系走向</span>「${outcome.name}」（${outcome.reversed?'逆位':'正位'}」——`;
    const outcomeIsMajor = outcome.type === 'major';
    if (!outcome.reversed && outcomeIsMajor) {
      narrative += `正位大阿卡纳给出了有力的肯定，但关系不是一纸证书——它是每天的选择和投入。`;
    } else if (outcome.reversed && outcomeIsMajor) {
      narrative += `逆位大阿卡纳提醒关系中存在不可忽视的议题。直面问题不会破坏关系——回避才会。`;
    } else {
      narrative += (outcome.reversed ? '逆位信号提示你们需要重新协商关系中的某些默认设定。' : '正向信号鼓励你们继续经营这段关系中的美好部分。');
    }

  } else if (sp === SPREADS.star) {
    const core = cards[0], challenge = cards[1], root = cards[2];
    const vision = cards[3], past = cards[4], near = cards[5], outcome = cards[6];

    narrative += `<span style="color:var(--purple);font-weight:600;">▸ 问题核心与深层动力</span><br>`;
    narrative += `核心：<span class="reading-highlight">「${core.name}」</span>`;
    narrative += core.reversed ? `（逆位——问题可能不是你所想的那样，建议重新框定你的问题）<br>` : `（你准确地把握了问题的本质）<br>`;
    narrative += `<br>${analyzeCardPair(root, core, 'support') || '根基层的能量正在默默支撑着核心议题的展开。'}`;
    narrative += `<br><br>${analyzeCardPair(core, challenge, 'challenge') || '挑战层与核心形成了张力——推动你突破舒适区的正是这股力量。'}`;

    narrative += `<br><br><span style="color:var(--purple);font-weight:600;">▸ 路径推演</span><br>`;
    narrative += `<span style="color:var(--text-dim);">远景</span>「${vision.name}」`;
    narrative += vision.reversed ? '（逆位——你对理想结果的想象可能需要被重新检验）<br>' : '（你有一个值得追求的目标）<br>';
    narrative += `→ <span style="color:var(--text-dim);">近期</span>「${near.name}」`;
    narrative += near.reversed ? '（短期内可能会遭遇波动）<br>' : '（近期会出现有利的进展）<br>';
    narrative += `→ <span style="color:var(--text-dim);">结果</span>「${outcome.name}」`;
    narrative += outcome.reversed ? '（最终结果提示需要调整策略）' : '（最终趋势指向收获）';
    narrative += `<br><br>`;

    // Critical path analysis
    if (vision.el === outcome.el) {
      narrative += `远景与结果同属${vision.el}元素——你内心真正的方向与最终可能到达的地方是<span style="color:var(--accent);">一致的</span>，中间的「${challenge.name}」是需要穿越的关卡而非放弃的理由。`;
    }
    if (past.el === root.el) {
      narrative += `<br>过去的影响「${past.name}」与潜意识根基「${root.name}」元素相同——说明<span style="color:var(--purple);">当前模式确实有深远的根源</span>，意识到这一点本身就是巨大的进步。`;
    }

  } else {
    // Single card
    const card = cards[0];
    narrative += `<span style="color:var(--purple);font-weight:600;">▸ 单牌深度解读</span><br>`;
    if (card.type === 'major') {
      narrative += `大阿卡纳「${card.name}」作为今日的指引——`;
      narrative += getNumerologyInsight(card.number);
      narrative += `<br><br>这张牌在${card.el}元素和${card.pl||'宇宙'}能量的共鸣中来到你面前，`;
      narrative += card.reversed ? '逆位姿态让你从另一个角度审视它的启示。' : '正位姿态让它以最直接的方式与你对话。';
    } else {
      const sData = MINOR_ARCANA[card.suit];
      narrative += `小阿卡纳「${card.name}」属于${sData.suit}牌组——`;
      narrative += `触及${sData.domain}的具体层面。`;
      narrative += getNumerologyInsight(card.number);
      narrative += `<br><br>${card.el}元素的${sData.suit}能量`;
      narrative += card.reversed ? '以逆位呈现，邀请你在该领域向内探索。' : '以正位呈现，鼓励你在该领域大胆行动。';
    }
  }

  // 通用：主题交叉发现
  narrative += `<br><br><span style="color:var(--text-dim);">🔍 交叉发现：</span>`;

  // 发现同数字牌
  const numGroups = {};
  cards.filter(c => c.type === 'minor').forEach(c => {
    if (!numGroups[c.number]) numGroups[c.number] = [];
    numGroups[c.number].push(c);
  });
  const sameNum = Object.entries(numGroups).filter(([n, cs]) => cs.length >= 2);
  if (sameNum.length > 0) {
    sameNum.forEach(([n, cs]) => {
      narrative += `<br>· ${cs.map(c => '「'+c.name+'」').join(' 与 ')} 同为数字${n}——`;
      narrative += `相同的数字在不同的花色中呼应，揭示了${getNumerologyInsight(parseInt(n)).slice(0,40)}...`;
    });
  } else if (cards.length >= 3) {
    // 没有重复数字，分析数字范围
    const nums = cards.map(c => c.number).filter(n => n !== undefined);
    if (nums.length >= 2) {
      const min = Math.min(...nums), max = Math.max(...nums);
      narrative += `<br>· 数字跨度从${min}到${max}，覆盖了${max-min+1}个数字层级——`;
      if (max - min >= 8) narrative += `宽广的范围提示这是一个<span style="color:var(--accent);">全面的生命图景</span>，涉及多个层面的议题。`;
      else if (max - min <= 3) narrative += `集中在一个窄带中，说明当前的课题<span style="color:var(--purple);">高度聚焦</span>。`;
      else narrative += `适中的跨度说明你在<span style="color:var(--purple);">几个相互关联的议题</span>之间穿行。`;
    }
  } else {
    narrative += `<br>· 这张牌的数字${cards[0].number||0}为你揭示了今天的核心频率——${getNumerologyInsight(cards[0].number||0).slice(0,80)}...`;
  }

  // 大阿卡纳与小阿卡纳交叉
  if (majors.length > 0 && minors.length > 0) {
    narrative += `<br><br>· 大阿卡纳${majors.map(c=>'「'+c.name+'」').join('、')} 为小阿卡纳照亮的日常议题提供了<span style="color:var(--accent);">更深的精神维度</span>——`;
    const mEls = [...new Set(majors.map(c => c.el))];
    const miEls = [...new Set(minors.map(c => c.el))];
    const shared = mEls.filter(e => miEls.includes(e));
    if (shared.length > 0) {
      narrative += `两者在${shared.join('、')}元素上交汇，说明精神层面的启示与日常生活的实践在同一个能量频道上。`;
    } else {
      narrative += `精神指引与日常课题分属不同元素领域——这正是你扩展内在版图的机会。`;
    }
  }

  // ===== 3. ACTIONS =====
  let actions = '';
  const actionPool = [];

  // 基于实际牌面的具体建议
  if (majors.some(c => c.name === '高塔')) {
    actionPool.push('⚡ 高塔出现——本周检视你的生活中哪些结构是建立在虚假基础上的。主动拆掉一面危墙，好过等它自己倒塌。');
  }
  if (majors.some(c => c.name === '隐士')) {
    actionPool.push('🏮 隐士在提醒你——这周刻意留出独处时间。不看手机、不听播客，只是安静地和自己待一会儿。答案会在寂静中浮现。');
  }
  if (majors.some(c => c.name === '节制')) {
    actionPool.push('🕊 节制的智慧——找到那个过犹不及的临界点。你最近在哪方面走得太极端了？往回收一步。');
  }
  if (majors.some(c => c.name === '倒吊人')) {
    actionPool.push('🙃 倒吊人的邀请——今天试着从完全相反的角度看待你最困扰的问题。如果你坚信A导致了B，试试假设B其实导致了A。');
  }
  if (majors.some(c => c.name === '力量')) {
    actionPool.push('🦁 力量牌告诉你——当前的问题不需要蛮力解决。哪个方面可以用温柔和耐心代替强硬和催促？');
  }

  // 基于元素缺失的建议
  if (missingEls.includes('水') && cards.length >= 3) {
    actionPool.push('💧 水元素缺席——这周刻意接触能触动你情感的事物：一首老歌、一部让你流泪的电影、一次深度对话。让情感流动起来。');
  }
  if (missingEls.includes('火') && cards.length >= 3) {
    actionPool.push('🔥 火元素缺席——你最近可能过于谨慎了。今天做一件不需要理由、纯粹因为"我想做"的事情。');
  }
  if (missingEls.includes('风') && cards.length >= 3) {
    actionPool.push('🍃 风元素缺席——思维可能有些停滞。坐下来写半小时日记，不修改、不评判，只是让想法流淌到纸上。');
  }
  if (missingEls.includes('土') && cards.length >= 3) {
    actionPool.push('🪨 土元素缺席——回到身体。去大自然中散步、做一顿饭、整理房间——用具体的行动重新连接大地。');
  }

  // 元素主导
  if (dominantEl[0] === '火') {
    actionPool.push('🔥 火能量旺盛——行动力是优势但也是陷阱。行动前多问一句："这真的是我现在需要做的吗？"');
  } else if (dominantEl[0] === '水') {
    actionPool.push('💧 水能量充沛——直觉敏锐的时期。这周做一个重要的决定时，除了理性分析，也问问你的"第一感觉"。');
  } else if (dominantEl[0] === '风') {
    actionPool.push('🍃 风能量主导——思维活跃但易陷入过度分析。给每个纠结设定一个"决策截止时间"，到了就行动。');
  } else if (dominantEl[0] === '土') {
    actionPool.push('🪨 土能量扎实——稳是好品质，但也可能变成停滞。这周做一件"出格"的小事，打破惯性的舒适区。');
  }

  // 正逆位
  if (revRatio > 0.4) {
    actionPool.push('🔄 较多逆位提示——适合做减法而非加法。取消一个不必要的承诺，推掉一场可去可不去的社交，还自己一些留白。');
  }
  if (revRatio === 0) {
    actionPool.push('✨ 全正位——能量通畅，是行动的好窗口期。把你思考最久的那件事，今天迈出第一步，哪怕只是一小步。');
  }

  // 场景
  const scActions = {
    life: '🧭 人生方向——这周做一件"愚者"式的小冒险：走一条新路回家、尝一道没吃过的菜、对未知保持好奇而非恐惧。',
    love: '💔 关系——如果已有伴侣，这周专注倾听而非表达。如果正在寻找，先成为你希望吸引的那个人。',
    career: '💼 事业——列出三件你真正擅长且乐在其中的事情，然后看看它们是否与你当下的工作方向一致。',
    money: '💰 财务——做一次"金钱信念反思"：你对钱最深的记忆是什么？那个记忆如何影响了你今天的财务决策？',
    spirit: '🧘 灵性——每天留出十分钟的沉默时间——没有目的、没有任务、没有手机。只是和自己在一起。',
    health: '🏥 身心——注意最近反复出现的身体小信号。你的身体在用什么方式对你说话？停下来听一听。'
  };
  actionPool.push(scActions[state.scenario] || '');

  // 去重挑选 4-5 条
  const selected = [...new Set(actionPool)].filter(Boolean).slice(0, 5);
  actions = selected.map((a, i) => `${i+1}. ${a}`).join('<br>');

  // ===== 4. CLOSING =====
  const closings = [
    '✨ 无论牌面揭示了光明或阴影、顺遂或挑战——它们都是你当下生命拼图的一部分。最终的决策权永远在你的手中。感谢你在这个向外追逐的世界里，愿意花时间向内看。',
    '🌙 塔罗牌是一面诚实的镜子——它不会告诉你"将会发生什么"，只会让你看见"已经存在的什么"。看见了，改变就开始了。',
    '🌟 每一张牌都是一扇门，通向一种可能的视角。今天你站在哪扇门前？明天你选择推开哪一扇？答案不在牌中——在你走向答案的脚步中。',
    '💫 占卜的真正意义不在于预测未来，而在于让你在此时此刻，更加清醒地面对自己。你已经迈出了最重要的一步：向内看的勇气。'
  ];
  const closing = closings[(totalNum + reversals.length) % closings.length];

  return { overview, narrative, actions, closing };
}

function resetDraw() {
  document.getElementById('shuffleArea').style.display = '';
  const deck = document.getElementById('shuffleDeck');
  deck.classList.remove('animating');
  startDraw();
}

// ==================== INIT ====================
function init() {
  renderScenarios(); // pre-render
}
init();
</script>
