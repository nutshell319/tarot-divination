<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>塔罗牌占卜 — 探索你的内心世界</title>
<style>
/* ========== CSS Variables & Reset ========== */
:root {
  --bg: #08090d;
  --bg-cover: #070609;
  --purple: #b98eff;
  --accent: #e85d75;
  --text: #f6f2e8;
  --text-dim: #aaa59a;
  --text-muted: #746f66;
  --card-bg: #11131a;
  --card-border: #1e1f2a;
  --radius: 10px;
  --font: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; min-height:100vh;
  background:var(--bg); color:var(--text);
  font-family:var(--font); line-height:1.6;
  overflow-x:hidden;
}

/* ========== Background ========== */
body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.025;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 49px,rgba(255,255,255,.02) 50px),
    repeating-linear-gradient(90deg,transparent,transparent 49px,rgba(255,255,255,.02) 50px);
}

/* ========== App Container ========== */
.app-container {
  position:relative; z-index:1;
  max-width:1100px; margin:0 auto; padding:40px 24px 80px;
  min-height:100vh; display:flex; flex-direction:column;
}

/* ========== Header ========== */
.app-header {
  text-align:center; padding:32px 0 12px;
}
.app-header h1 {
  font-size:2rem; font-weight:700; color:var(--purple); letter-spacing:2px;
}
.app-header .subtitle {
  font-size:.9rem; color:var(--text-dim); margin-top:6px; letter-spacing:1px;
}
.divider {
  width:60px; height:2px; background:var(--purple); margin:16px auto 0; border-radius:1px;
}

/* ========== Stage Display ========== */
.stage { display:none; flex-direction:column; align-items:center; flex:1; }
.stage.active { display:flex; }

/* ========== Welcome Stage ========== */
.welcome-content {
  text-align:center; padding:40px 20px; max-width:600px;
}
.welcome-content .icon-main {
  font-size:4rem; margin-bottom:20px; opacity:.9;
}
.welcome-content h2 {
  font-size:1.5rem; color:var(--text); margin-bottom:12px;
}
.welcome-content p {
  color:var(--text-dim); font-size:.95rem; margin-bottom:8px; line-height:1.8;
}
.welcome-content .features {
  display:flex; gap:20px; justify-content:center; flex-wrap:wrap; margin:28px 0;
}
.welcome-content .feature-item {
  background:var(--card-bg); border:1px solid var(--card-border);
  border-radius:var(--radius); padding:16px 20px; text-align:center; min-width:100px;
}
.welcome-content .feature-item .fi-icon { font-size:1.8rem; margin-bottom:6px; }
.welcome-content .feature-item .fi-label { font-size:.8rem; color:var(--text-dim); }

/* ========== Buttons ========== */
.btn {
  display:inline-flex; align-items:center; gap:8px;
  padding:12px 32px; border-radius:var(--radius); font-size:.95rem;
  font-family:var(--font); cursor:pointer; transition:all .25s;
  border:none; letter-spacing:1px; text-decoration:none;
}
.btn-primary {
  background:var(--purple); color:#0a0a0f; font-weight:600;
}
.btn-primary:hover { background:#c9a3ff; transform:translateY(-1px); box-shadow:0 4px 20px rgba(185,142,255,.25); }
.btn-outline {
  background:transparent; border:1px solid var(--purple); color:var(--purple);
}
.btn-outline:hover { background:rgba(185,142,255,.08); }
.btn-accent {
  background:var(--accent); color:#fff; font-weight:600;
}
.btn-accent:hover { background:#f06d82; transform:translateY(-1px); box-shadow:0 4px 20px rgba(232,93,117,.25); }
.btn-sm { padding:8px 20px; font-size:.85rem; }
.btn:disabled { opacity:.4; cursor:not-allowed; pointer-events:none; }

/* ========== Scenario Cards ========== */
.scenario-grid {
  display:grid; grid-template-columns:repeat(3, 1fr);
  gap:16px; max-width:800px; width:100%; margin:20px 0;
}
@media (max-width:700px) { .scenario-grid { grid-template-columns:repeat(2, 1fr); } }
.scenario-card {
  background:var(--card-bg); border:1px solid var(--card-border);
  border-radius:var(--radius); padding:24px 16px; text-align:center;
  cursor:pointer; transition:all .3s; position:relative;
}
.scenario-card:hover {
  border-color:var(--purple); transform:translateY(-2px);
  box-shadow:0 8px 30px rgba(185,142,255,.1);
}
.scenario-card.selected {
  border-color:var(--purple);
  box-shadow:0 0 0 2px rgba(185,142,255,.25);
}
.scenario-card .sc-icon { font-size:2.2rem; margin-bottom:10px; }
.scenario-card .sc-name { font-size:.95rem; font-weight:600; color:var(--text); }
.scenario-card .sc-desc { font-size:.78rem; color:var(--text-dim); margin-top:4px; }
.scenario-card .sc-check {
  position:absolute; top:8px; right:10px; width:20px; height:20px;
  border-radius:50%; background:var(--purple); color:#0a0a0f;
  display:none; align-items:center; justify-content:center; font-size:12px;
}
.scenario-card.selected .sc-check { display:flex; }

/* ========== Spread Selection ========== */
.spread-list { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; margin:20px 0; }
.spread-option {
  background:var(--card-bg); border:1px solid var(--card-border);
  border-radius:var(--radius); padding:20px 24px; cursor:pointer;
  transition:all .3s; text-align:center; min-width:160px; max-width:220px;
}
.spread-option:hover { border-color:var(--purple); }
.spread-option.selected { border-color:var(--purple); box-shadow:0 0 0 2px rgba(185,142,255,.25); }
.spread-option .sp-icon { font-size:1.6rem; margin-bottom:8px; }
.spread-option .sp-name { font-weight:600; color:var(--text); font-size:.9rem; }
.spread-option .sp-cards { font-size:.78rem; color:var(--text-dim); margin-top:4px; }
.spread-option .sp-use { font-size:.75rem; color:var(--text-muted); margin-top:6px; }

/* ========== Draw Stage ========== */
.draw-area { text-align:center; padding:20px 0; }
.draw-area .draw-prompt { font-size:1.1rem; color:var(--text-dim); margin-bottom:8px; }
.draw-area .draw-instruction { font-size:.85rem; color:var(--text-muted); margin-bottom:24px; }

/* Shuffle animation */
.shuffle-area {
  position:relative; width:150px; height:210px; margin:0 auto 24px;
}
.shuffle-card {
  position:absolute; width:150px; height:210px;
  background:var(--card-bg); border:2px solid var(--purple);
  border-radius:12px; transition:all .5s cubic-bezier(.22,1,.36,1);
}
@keyframes shuffleAnim {
  0% { transform:translateX(0) rotate(0); }
  20% { transform:translateX(-40px) rotate(-8deg); }
  40% { transform:translateX(30px) rotate(5deg); }
  60% { transform:translateX(-20px) rotate(-3deg); }
  80% { transform:translateX(10px) rotate(2deg); }
  100% { transform:translateX(0) rotate(0); }
}
.shuffle-card.animating { animation:shuffleAnim 1.2s ease-in-out; }

/* ========== Tarot Card Component ========== */
.tarot-card {
  width:150px; height:225px; perspective:1000px; cursor:pointer;
  transition:transform .3s;
}
.tarot-card:hover { transform:translateY(-4px); }
.tarot-card.flipped { cursor:default; }
.tarot-card.flipped:hover { transform:none; }

.tarot-card .card-inner {
  position:relative; width:100%; height:100%;
  transition:transform .8s cubic-bezier(.4,0,.2,1);
  transform-style:preserve-3d;
}
.tarot-card.flipped .card-inner { transform:rotateY(180deg); }

.tarot-card .card-face {
  position:absolute; inset:0; backface-visibility:hidden;
  border-radius:12px; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  border:2px solid var(--card-border);
}

/* Card Back */
.card-back {
  background:linear-gradient(135deg, #14101f 0%, #1a1430 50%, #14101f 100%);
  border-color:#2a2540 !important;
}
.card-back .back-pattern {
  width:90px; height:90px; border:2px solid #3a3060; border-radius:50%;
  display:flex; align-items:center; justify-content:center; position:relative;
}
.card-back .back-pattern::before {
  content:''; position:absolute; width:70px; height:70px;
  border:1px solid #4a3d70; border-radius:50%;
}
.card-back .back-star {
  font-size:2rem; color:var(--purple); opacity:.7;
}
.card-back .back-dots {
  position:absolute; inset:16px;
  display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr;
  place-items:center;
}
.card-back .back-dots span {
  width:4px; height:4px; background:var(--purple); border-radius:50%; opacity:.4;
}
.card-back .back-corner {
  position:absolute; font-size:10px; color:var(--purple); opacity:.3;
}
.card-back .bc-tl { top:10px; left:12px; }
.card-back .bc-tr { top:10px; right:12px; }
.card-back .bc-bl { bottom:10px; left:12px; }
.card-back .bc-br { bottom:10px; right:12px; }

/* Card Front */
.card-front {
  background:linear-gradient(180deg, #15111f 0%, #1c1630 100%);
  transform:rotateY(180deg); padding:16px 12px; justify-content:flex-start;
}
.card-front.major { border-color:#5a4080; }
.card-front.wands { border-color:#8b4513; }
.card-front.cups { border-color:#2e6b8f; }
.card-front.swords { border-color:#6b8fa0; }
.card-front.pentacles { border-color:#5a7a4a; }

.card-front .cf-number {
  font-size:.7rem; color:var(--text-muted); letter-spacing:2px; margin-bottom:4px;
}
.card-front .cf-name {
  font-size:.95rem; font-weight:700; color:var(--text); margin-bottom:2px;
}
.card-front .cf-en {
  font-size:.7rem; color:var(--text-dim); margin-bottom:12px; font-style:italic;
}
.card-front .cf-symbol {
  font-size:2.4rem; margin-bottom:10px; opacity:.85;
}
.card-front .cf-keywords {
  font-size:.7rem; color:var(--text-dim); text-align:center; line-height:1.5;
}
.card-front .cf-reversed-badge {
  display:none; margin-top:8px; padding:3px 10px; border-radius:20px;
  background:rgba(232,93,117,.15); color:var(--accent); font-size:.7rem;
}
.card-front.reversed .cf-reversed-badge { display:inline-block; }
.card-front.reversed .cf-name { color:var(--accent); }

/* Card spread layout */
.cards-row {
  display:flex; gap:24px; flex-wrap:wrap; justify-content:center; align-items:flex-start;
}
.cards-col { display:flex; flex-direction:column; align-items:center; gap:12px; }
.card-position-label {
  font-size:.75rem; color:var(--text-muted); text-align:center; max-width:150px;
  margin-bottom:4px; letter-spacing:1px;
}
.card-position-label strong { color:var(--purple); display:block; font-size:.8rem; }

/* Relationship spread */
.spread-relation {
  display:flex; flex-direction:column; align-items:center; gap:30px;
}
.spread-relation .relation-parties {
  display:flex; gap:60px; flex-wrap:wrap; justify-content:center;
}
.spread-relation .relation-party { text-align:center; }
.spread-relation .relation-party h4 {
  font-size:.9rem; color:var(--purple); margin-bottom:16px; letter-spacing:2px;
}
.spread-relation .relation-outcome { text-align:center; }

/* ========== Reading Panel ========== */
.reading-panel {
  background:var(--card-bg); border:1px solid var(--card-border);
  border-radius:var(--radius); padding:24px; max-width:700px; width:100%;
  margin-top:28px;
}
.reading-panel h3 {
  font-size:1.1rem; color:var(--purple); margin-bottom:8px;
}
.reading-panel .reading-text {
  font-size:.9rem; color:var(--text-dim); line-height:1.8;
}
.reading-panel .reading-highlight {
  color:var(--accent); font-weight:600;
}

/* ========== Section Title ========== */
.section-title {
  font-size:1.2rem; color:var(--purple); text-align:center; margin-bottom:8px;
}
.section-desc {
  font-size:.85rem; color:var(--text-dim); text-align:center; margin-bottom:20px;
}

/* ========== Back Link ========== */
.back-link {
  display:inline-flex; align-items:center; gap:6px;
  color:var(--text-muted); font-size:.85rem; cursor:pointer;
  margin-bottom:20px; transition:color .2s;
}
.back-link:hover { color:var(--purple); }

/* ========== Footer ========== */
.app-footer {
  text-align:center; padding:24px; color:var(--text-muted); font-size:.75rem;
  margin-top:auto;
}

/* ========== Animations ========== */
@keyframes fadeInUp {
  from { opacity:0; transform:translateY(20px); }
  to { opacity:1; transform:translateY(0); }
}
.fade-in { animation:fadeInUp .6s ease-out both; }
.fade-in-d1 { animation-delay:.1s; }
.fade-in-d2 { animation-delay:.2s; }
.fade-in-d3 { animation-delay:.3s; }
.fade-in-d4 { animation-delay:.4s; }
.fade-in-d5 { animation-delay:.5s; }

@keyframes cardDeal {
  from { opacity:0; transform:translateY(-60px) scale(.6) rotateY(180deg); }
  to { opacity:1; transform:translateY(0) scale(1) rotateY(0); }
}
.card-deal { animation:cardDeal .7s cubic-bezier(.22,1,.36,1) both; }

/* ========== Toast ========== */
.toast {
  position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:200;
  padding:10px 24px; border-radius:var(--radius); font-size:.85rem;
  background:var(--purple); color:#0a0a0f; letter-spacing:1px;
  opacity:0; transition:opacity .3s;
}
.toast.show { opacity:1; }

/* ========== Responsive ========== */
@media (max-width:600px) {
  .app-container { padding:20px 12px 60px; }
  .app-header h1 { font-size:1.4rem; }
  .tarot-card { width:120px; height:180px; }
  .shuffle-area { width:120px; height:180px; }
  .shuffle-card { width:120px; height:180px; }
  .cards-row { gap:12px; }
  .card-position-label { max-width:120px; font-size:.7rem; }
  .card-position-label strong { font-size:.73rem; }
  .card-front .cf-name { font-size:.8rem; }
  .card-front .cf-symbol { font-size:1.8rem; }
  .card-front .cf-keywords { font-size:.65rem; }
  .spread-relation .relation-parties { gap:20px; }
}
</style>
</head>
<body>

<div class="app-container" id="app">

  <!-- Header -->
  <header class="app-header">
    <h1>🔮 塔罗牌占卜</h1>
    <p class="subtitle">倾听内心的声音，照亮前行的路</p>
    <div class="divider"></div>
  </header>

  <!-- ==================== Stage 0: Welcome ==================== -->
  <div class="stage active" id="stage-welcome">
    <div class="welcome-content fade-in">
      <div class="icon-main">🃏</div>
      <h2>准备好探索你的内心了吗？</h2>
      <p>塔罗牌不是迷信——它是借助 78 张原型牌面<br>进行自我反思与内在对话的工具。</p>
      <div class="features">
        <div class="feature-item fade-in fade-in-d1">
          <div class="fi-icon">🎯</div>
          <div class="fi-label">选择场景</div>
        </div>
        <div class="feature-item fade-in fade-in-d2">
          <div class="fi-icon">📐</div>
          <div class="fi-label">确定牌阵</div>
        </div>
        <div class="feature-item fade-in fade-in-d3">
          <div class="fi-icon">✨</div>
          <div class="fi-label">抽牌翻牌</div>
        </div>
        <div class="feature-item fade-in fade-in-d4">
          <div class="fi-icon">💡</div>
          <div class="fi-label">解读启示</div>
        </div>
      </div>
      <button class="btn btn-primary" onclick="goStage('scenario')" style="margin-top:20px;">
        开始占卜 →
      </button>
    </div>
  </div>

  <!-- ==================== Stage 1: Scenario Selection ==================== -->
  <div class="stage" id="stage-scenario">
    <div class="back-link" onclick="goStage('welcome')">← 返回</div>
    <div class="section-title fade-in">你想探索哪个领域？</div>
    <div class="section-desc fade-in fade-in-d1">选择一个与你当下最相关的问题方向</div>
    <div class="scenario-grid" id="scenarioGrid"></div>
    <button class="btn btn-primary fade-in" id="btnScenarioNext" disabled onclick="goStage('spread')">
      下一步：选择牌阵 →
    </button>
  </div>

  <!-- ==================== Stage 2: Spread Selection ==================== -->
  <div class="stage" id="stage-spread">
    <div class="back-link" onclick="goStage('scenario')">← 返回选择场景</div>
    <div class="section-title fade-in">选择牌阵</div>
    <div class="section-desc fade-in fade-in-d1" id="spreadRecommend"></div>
    <div class="spread-list" id="spreadList"></div>
    <button class="btn btn-primary fade-in" id="btnSpreadNext" disabled onclick="startDraw()">
      开始抽牌 ✨
    </button>
  </div>

  <!-- ==================== Stage 3: Draw & Reveal ==================== -->
  <div class="stage" id="stage-draw">
    <div class="back-link" onclick="resetDraw()">← 重新选择</div>
    <div class="section-title fade-in" id="drawTitle">请集中注意力，默念你的问题</div>
    <div class="section-desc fade-in fade-in-d1" id="drawDesc">点击下方按钮洗牌，然后逐一翻开牌面</div>

    <!-- Shuffle area -->
    <div class="shuffle-area" id="shuffleArea">
      <div class="shuffle-card" id="shuffleDeck">
        <div class="card-face card-back" style="position:absolute;inset:0;">
          <div class="back-corner bc-tl">✦</div><div class="back-corner bc-tr">✦</div>
          <div class="back-corner bc-bl">✦</div><div class="back-corner bc-br">✦</div>
          <div class="back-pattern"><span class="back-star">✧</span></div>
          <div class="back-dots"><span></span><span></span><span></span><span></span></div>
        </div>
      </div>
    </div>

    <button class="btn btn-accent fade-in" id="btnShuffle" onclick="doShuffle()">🔄 洗牌</button>
    <button class="btn btn-outline btn-sm fade-in fade-in-d1" id="btnDraw" style="display:none;" onclick="dealCards()">📜 抽牌</button>

    <!-- Spread display area -->
    <div id="spreadDisplay" style="margin-top:28px;"></div>

    <!-- Flip all button -->
    <button class="btn btn-outline btn-sm" id="btnRevealAll" style="display:none;margin-top:16px;" onclick="revealAll()">
      👁 全部翻开
    </button>

    <!-- Reading -->
    <div class="reading-panel fade-in" id="readingPanel" style="display:none;"></div>

    <button class="btn btn-primary" id="btnRedraw" style="display:none;margin-top:20px;" onclick="resetDraw()">
      🔄 重新占卜
    </button>
  </div>

  <!-- Footer -->
  <footer class="app-footer">
    塔罗牌是自我反思的工具 · 保持开放的心，但最终的决策在你手中
  </footer>
</div>

// ==================== DECK MANAGEMENT ====================
function buildDeck() {
  const deck = [];
  MAJOR_ARCANA.forEach(c => deck.push({
    ...c, type:'major', suit:null, number:parseInt(c.id)
  }));
  Object.entries(MINOR_ARCANA).forEach(([suitKey, suitData]) => {
    // Numbered cards
    Object.entries(suitData.cards).forEach(([num, card]) => {
      deck.push({
        id: 22 + deck.length,
        n:String(num),
        name:card.name,
        en:`${num} of ${suitData.suit}`,
        type:'minor', suit:suitKey, number:parseInt(num),
        up:card.up, rev:card.rev,
        sym:suitData.sym, el:suitData.el, pl:'',
        kw:suitData.domain
      });
    });
    // Court cards
    COURT_KEYS.forEach((ck, i) => {
      const cm = COURT_MEANINGS[ck];
      deck.push({
        id: 22 + deck.length,
        n:['P','Kn','Q','K'][i],
        name:`${suitData.suit}${cm.role}`,
        en:`${cm.role} of ${suitData.suit}`,
        type:'minor', suit:suitKey, number:11+i, isCourt:true,
        up:cm.up, rev:cm.rev,
        sym:suitData.sym, el:suitData.el, pl:'',
        kw:suitData.domain
      });
    });
  });
  return deck;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function drawCards(n) {
  const deck = shuffle(buildDeck());
  return deck.slice(0, n).map(c => ({
    ...c,
    reversed: Math.random() < 0.45 // 45% chance reversed
  }));
}

// ==================== UI RENDERING ====================
function goStage(name) {
  document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
  const target = document.getElementById('stage-' + name);
  if (target) target.classList.add('active');
  state.stage = name;
  window.scrollTo({ top:0, behavior:'smooth' });

  if (name === 'scenario') renderScenarios();
  if (name === 'spread') renderSpreads();
}

function renderScenarios() {
  const grid = document.getElementById('scenarioGrid');
  grid.innerHTML = SCENARIOS.map(s => `
    <div class="scenario-card fade-in ${state.scenario===s.id?'selected':''}"
         onclick="selectScenario('${s.id}')">
      <div class="sc-check">✓</div>
      <div class="sc-icon">${s.icon}</div>
      <div class="sc-name">${s.name}</div>
      <div class="sc-desc">${s.desc}</div>
    </div>
  `).join('');
  updateScenarioButton();
}

function selectScenario(id) {
  state.scenario = id;
  state.spread = null;
  renderScenarios();
}

function updateScenarioButton() {
  const btn = document.getElementById('btnScenarioNext');
  btn.disabled = !state.scenario;
}

function renderSpreads() {
  const list = document.getElementById('spreadList');
  const sc = SCENARIOS.find(s => s.id === state.scenario);
  document.getElementById('spreadRecommend').textContent =
    `为"${sc.name}"场景推荐以下牌阵：`;

  const allowed = SCENARIO_SPREADS[state.scenario] || ['single','triple'];
  list.innerHTML = allowed.map(key => {
    const sp = SPREADS[key];
    return `
      <div class="spread-option fade-in ${state.spread===key?'selected':''}"
           onclick="selectSpread('${key}')">
        <div class="sp-icon">${sp.icon}</div>
        <div class="sp-name">${sp.name}</div>
        <div class="sp-cards">${sp.cards} 张牌</div>
        <div class="sp-use">${sp.use}</div>
      </div>
    `;
  }).join('');
  updateSpreadButton();
}

function selectSpread(key) {
  state.spread = key;

}

  const deck = document.getElementById('shuffleDeck');
  const btn = document.getElementById('btnShuffle');
  btn.disabled = true;
  deck.classList.add('animating');

  // Draw cards during shuffle
  const sp = SPREADS[state.spread];
  state.cards = drawCards(sp.cards);
  state.flippedCount = 0;

  setTimeout(() => {
    deck.classList.remove('animating');
    document.getElementById('btnDraw').style.display = '';
    document.getElementById('shuffleArea').style.display = 'none';
    btn.style.display = 'none';
    document.getElementById('drawDesc').textContent = '洗牌完成。点击"抽牌"查看你的牌面。';
  }, 1300);
}

function dealCards() {
  document.getElementById('btnDraw').style.display = 'none';
  const sp = SPREADS[state.spread];
  const display = document.getElementById('spreadDisplay');

  if (state.spread === 'single') {
    display.innerHTML = `
      <div class="cards-row">
        ${renderCardHTML(state.cards[0], 0)}
      </div>`;
  } else if (state.spread === 'triple') {
    display.innerHTML = `
      <div class="cards-row">
        ${state.cards.map((c, i) => `
          <div class="cards-col">
            <div class="card-position-label"><strong>${sp.positions[i]}</strong></div>
            ${renderCardHTML(c, i)}
          </div>
        `).join('')}
      </div>`;
  } else if (state.spread === 'relation') {
    display.innerHTML = `
      <div class="spread-relation">
        <div class="relation-parties">
          <div class="relation-party">
            <h4>👤 你</h4>
            <div class="cards-row">
              ${[0,1,2].map(i => `
                <div class="cards-col">
                  <div class="card-position-label"><strong>${sp.positions[i]}</strong></div>
                  ${renderCardHTML(state.cards[i], i)}
                </div>
              `).join('')}
            </div>
          </div>
          <div class="relation-party">
            <h4>👤 对方</h4>
            <div class="cards-row">
              ${[3,4,5].map(i => `
                <div class="cards-col">
                  <div class="card-position-label"><strong>${sp.positions[i]}</strong></div>
                  ${renderCardHTML(state.cards[i], i)}
                </div>
              `).join('')}
            </div>
          </div>
        </div>
        <div class="relation-outcome">
          <div class="card-position-label"><strong>${sp.positions[6]}</strong></div>
          ${renderCardHTML(state.cards[6], 6)}
        </div>
      </div>`;
  } else if (state.spread === 'star') {
    // 7-card star layout: 3 on top row, 1 center, 3 bottom
    display.innerHTML = `
      <div class="cards-row" style="margin-bottom:20px;">
        ${[3,0,1].map(i => `
          <div class="cards-col">
            <div class="card-position-label"><strong>${sp.positions[i]}</strong></div>
            ${renderCardHTML(state.cards[i], i)}
          </div>
        `).join('')}
      </div>
      <div class="cards-row" style="margin-bottom:20px;">
        ${[4,2].map(i => `
          <div class="cards-col">
            <div class="card-position-label"><strong>${sp.positions[i]}</strong></div>
            ${renderCardHTML(state.cards[i], i)}
          </div>
        `).join('')}
      </div>
      <div class="cards-row">
        ${[5,6].map(i => `
          <div class="cards-col">
            <div class="card-position-label"><strong>${sp.positions[i]}</strong></div>
            ${renderCardHTML(state.cards[i], i)}
          </div>
        `).join('')}
      </div>`;

  document.getElementById('btnRevealAll').style.display = '';
  document.getElementById('drawDesc').textContent =

  // Card deal animation
  setTimeout(() => {
    display.querySelectorAll('.tarot-card').forEach((el, i) => {
      el.classList.add('card-deal');
      el.style.animationDelay = (i * 0.15) + 's';
    });
  }, 100);
}

function getCardSuitClass(card) {
  if (card.type === 'major') return 'major';
  return card.suit;
}

function renderCardHTML(card, idx) {
  // Card front HTML
  let frontHTML = '';
  if (card.type === 'major') {
    frontHTML = `
      <div class="cf-number">${card.n}</div>
      <div class="cf-symbol">${card.sym}</div>
      <div class="cf-name">${card.name}</div>
      <div class="cf-en">${card.en}</div>
      <div class="cf-keywords">${card.up}</div>`;
  } else {
    frontHTML = `
      <div class="cf-number">${card.n}</div>
      <div class="cf-symbol">${card.sym}</div>
      <div class="cf-name">${card.name}</div>
      <div class="cf-keywords">${card.el}元素 · ${card.kw}</div>`;
  }

  const revClass = card.reversed ? ' reversed' : '';

  return `
    <div class="tarot-card" id="card-${idx}" onclick="flipCard(${idx})">
      <div class="card-inner">
        <div class="card-face card-back">
          <div class="back-corner bc-tl">✦</div>
          <div class="back-corner bc-tr">✦</div>
          <div class="back-corner bc-bl">✦</div>
          <div class="back-corner bc-br">✦</div>
          <div class="back-pattern"><span class="back-star">✧</span></div>
          <div class="back-dots"><span></span><span></span><span></span><span></span></div>
        </div>
        <div class="card-face card-front ${getCardSuitClass(card)}${revClass}">
          ${frontHTML}
          <div class="cf-reversed-badge">⬇ 逆位</div>
        </div>
      </div>
    </div>`;
}

function flipCard(idx) {
  const el = document.getElementById('card-' + idx);
  if (!el || el.classList.contains('flipped')) return;

  el.classList.add('flipped');
  state.flippedCount++;

  // Show reading after all cards flipped
  const sp = SPREADS[state.spread];
  if (state.flippedCount >= sp.cards) {
    setTimeout(() => showReading(), 600);
  }
}

function revealAll() {
  const sp = SPREADS[state.spread];
  for (let i = 0; i < sp.cards; i++) {
    setTimeout(() => flipCard(i), i * 200);
  }
  document.getElementById('btnRevealAll').style.display = 'none';
}

// ==================== READING / INTERPRETATION ====================
function showReading() {
  const sp = SPREADS[state.spread];
  const panel = document.getElementById('readingPanel');

  let html = `<h3>📖 解读摘要</h3>`;

  // Count upright vs reversed
  const upright = state.cards.filter(c => !c.reversed).length;
  const reversed = state.cards.filter(c => c.reversed).length;

  html += `<p class="reading-text" style="margin-bottom:16px;">`;
  html += `本次抽取 <span class="reading-highlight">${sp.cards} 张牌</span>`;
  html += `，其中正位 ${upright} 张，逆位 ${reversed} 张。`;
  if (reversed > sp.cards/2) {
    html += `<br>逆位牌较多，提示<span class="reading-highlight">内在阻力或能量受阻</span>需要关注。`;
  }
  html += `</p>`;

  // Per-card interpretation
  state.cards.forEach((card, i) => {
    const posLabel = sp.positions[i];
    const orient = card.reversed ? '⬇ 逆位' : '⬆ 正位';
    const meaning = card.reversed ? card.rev : card.up;

    html += `
      <div style="margin-top:16px; padding:14px 16px; background:rgba(185,142,255,.04); border-left:3px solid ${card.reversed?'var(--accent)':'var(--purple)'}; border-radius:0 8px 8px 0;">
        <p class="reading-text" style="margin-bottom:4px;">
          <strong style="color:var(--purple);">${posLabel}</strong>
          <span style="color:var(--text-muted);font-size:.8rem;"> · ${orient}</span>
        </p>
        <p class="reading-text" style="font-size:.95rem;color:var(--text);">
          ${card.type==='major'?'★ ':''}${card.name}
        </p>
        <p class="reading-text" style="margin-top:4px;">
          ${meaning}
        </p>
        <p class="reading-text" style="margin-top:6px;font-size:.8rem;color:var(--text-muted);">
          ${getPositionAdvice(sp, i, card)}
        </p>
      </div>`;
  });

  // ===== 最终总结解读 =====
  const synthesis = buildFinalSummary();
  html += `
    <div style="margin-top:28px; padding:24px; background:linear-gradient(135deg, rgba(185,142,255,.06) 0%, rgba(232,93,117,.04) 100%); border:1px solid rgba(185,142,255,.12); border-radius:var(--radius);">
      <h3 style="color:var(--purple);font-size:1.1rem;margin-bottom:16px;">📋 最终总结解读</h3>

      <div style="margin-bottom:18px;">
        <p class="reading-text" style="color:var(--text);font-size:.95rem;line-height:2;">
          ${synthesis.overview}
        </p>
      </div>

      <div style="margin-bottom:18px; padding:16px; background:rgba(185,142,255,.04); border-radius:8px;">
        <p class="reading-text" style="color:var(--purple);font-weight:600;margin-bottom:8px;font-size:.9rem;">🔗 牌面联动分析</p>
        <p class="reading-text" style="color:var(--text-dim);font-size:.9rem;line-height:2;">
          ${synthesis.narrative}
        </p>
      </div>

      <div style="margin-bottom:16px;">
        <p class="reading-text" style="color:var(--accent);font-weight:600;margin-bottom:8px;font-size:.9rem;">🎯 关键行动建议</p>
        <p class="reading-text" style="color:var(--text-dim);font-size:.9rem;line-height:2;">
          ${synthesis.actions}
        </p>
      </div>

      <div style="padding:14px; background:rgba(232,93,117,.05); border-left:3px solid var(--accent); border-radius:0 8px 8px 0;">
        <p class="reading-text" style="color:var(--text);font-size:.9rem;line-height:2;font-style:italic;">
          ${synthesis.closing}
        </p>
      </div>
    </div>`;

  panel.innerHTML = html;
  panel.style.display = '';
  document.getElementById('btnRedraw').style.display = '';
  document.getElementById('btnRevealAll').style.display = 'none';

  // Scroll to reading
  setTimeout(() => panel.scrollIntoView({ behavior:'smooth', block:'start' }), 300);
}

function getPositionAdvice(spread, idx, card) {
  const pos = spread.positions[idx];
  if (pos.includes('过去')) return '反思这段经历带来了什么智慧。';
  if (pos.includes('现在') || pos.includes('当下') || pos.includes('现状')) return '这是你当前需要正视的核心能量。';
  if (pos.includes('未来') || pos.includes('走向') || pos.includes('结果')) return '这并非注定的结局——你的行动可以改变趋势。';
  if (pos.includes('挑战') || pos.includes('障碍')) return '这是成长必须跨越的门槛，而非不可战胜的敌人。';
  if (pos.includes('感受')) return '关注真实的情感流动，而非"应该"的感受。';
  if (pos.includes('想法')) return '审视这些想法是来自理性还是恐惧。';
  if (pos.includes('行为')) return '行动比言语更有说服力——你实际在做什么？';
  if (pos.includes('根基') || pos.includes('潜意识')) return '这可能是你尚未意识到的深层驱动力量。';
  if (pos.includes('远景')) return '这个愿景值得追求，但需要脚踏实地的步骤。';
  if (card.reversed) return '逆位提示你：这部分能量需要向内审视或重新调整。';
  return '让这张牌的能量与你正在探索的问题产生共鸣。';
}

function getSynthesis() { return ''; } // replaced by buildFinalSummary()

// ==================== FINAL SUMMARY ENGINE ====================
function buildFinalSummary() {
  const cards = state.cards;
  const sp = SPREADS[state.spread];
  const sc = SCENARIOS.find(s => s.id === state.scenario);

  // --- Element distribution ---
  const elCount = { '火':0, '水':0, '风':0, '土':0 };
  cards.forEach(c => { if (elCount[c.el] !== undefined) elCount[c.el]++; });
  const dominantEl = Object.entries(elCount).sort((a,b) => b[1]-a[1])[0];
  const secondEl = Object.entries(elCount).sort((a,b) => b[1]-a[1])[1];

  // --- Major/Minor ---
  const majors = cards.filter(c => c.type === 'major');
  const minors = cards.filter(c => c.type === 'minor');
  const majorRatio = majors.length / cards.length;

  // --- Reversal ---
  const revCount = cards.filter(c => c.reversed).length;
  const revRatio = revCount / cards.length;

  // --- Suit keyword ---
  const suitMap = { wands:'权杖', cups:'圣杯', swords:'宝剑', pentacles:'星币' };
  const suitCount = {};
  minors.forEach(c => { const k = c.suit; if (k) suitCount[k] = (suitCount[k]||0)+1; });
  const dominantSuit = Object.entries(suitCount).sort((a,b) => b[1]-a[1])[0];

  // --- Element meanings ---
  const elMeanings = {
    '火': '火元素（权杖）旺盛，你的行动力和激情是当下的主导力量。内心有强烈的冲动想要去做、去改变、去创造。',
    '水': '水元素（圣杯）充沛，情感和直觉是当下的主旋律。内心世界波澜起伏，关系与感受需要被优先关注。',
    '风': '风元素（宝剑）占主导，思维和沟通是核心课题。你可能在反复思量、分析权衡，头脑中上演着对话与辩论。',
    '土': '土元素（星币）突出，务实和安全感是当下的基调。你更关注实际的成果、物质的稳定和脚踏实地的进展。'
  };

  // ===== 1. OVERVIEW =====
  let overview = '';
  const scName = sc ? sc.name : '你的问题';

  // Opening
  overview += `本次占卜聚焦于<span class="reading-highlight">「${scName}」</span>，`;

  // Energy assessment
  if (dominantEl[1] >= secondEl[1] + 2) {
    overview += elMeanings[dominantEl[0]] + ' ';
  } else if (dominantEl[1] === secondEl[1] && dominantEl[1] > 0) {
    overview += `${dominantEl[0]}元素与${secondEl[0]}元素并重，提示你在行动与感受之间需要寻找平衡——既要有向前的动力，也要有向内的觉察。`;
  } else {
    overview += `各元素能量相对均衡，说明当前生活各领域都在协调运作，没有单一维度严重失衡。`;
  }

  // Major Arcana significance
  if (majorRatio >= 0.5) {
    overview += `<br><br>牌阵中<span class="reading-highlight">大阿卡纳占比 ${Math.round(majorRatio*100)}%</span>，`;
    if (majors.some(c => c.name === '高塔' || c.name === '死神')) {
      overview += `并且出现了具有强烈转变意味的主牌——</span>这绝非小事，当前的经历正在塑造你人生的一个重要章节。`;
    } else if (majors.some(c => c.name === '太阳' || c.name === '世界' || c.name === '星星')) {
      overview += `且出现了极具祝福意味的主牌——这是宇宙在告诉你，你正走在正确的道路上。`;
    } else {
      overview += `说明当前议题对你而言不是过眼云烟，而是一个值得深入对待的人生课题。命运之手正在推动一些重要的事情发生。`;
    }
  } else if (majorRatio === 0) {
    overview += `<br><br>全为小阿卡纳，提示当前能量的焦点在日常层面——`;
    if (dominantSuit) {
      overview += `<span class="reading-highlight">「${suitMap[dominantSuit[0]]}」</span>花色尤为突出，`;
    }
    overview += `从小处着手、处理好眼前的具体事务，比纠结于宏大命题更有意义。`;
  }

  // Reversal insight
  if (revRatio > 0.5) {
    overview += `<br><br>超过半数牌以逆位呈现（${revCount}/${cards.length}），提示当前存在<span class="reading-highlight">内在的拉扯与阻力</span>——能量不是向外流动而是向内回旋。这并非坏事，而是邀请你停下来重新审视：哪些观念需要被翻转？哪些执念需要被放下？`;
  } else if (revRatio > 0 && revRatio <= 0.3) {
    overview += `<br><br>大部分牌呈正位，整体能量顺畅。少数逆位牌指出了需要你额外留意的<span class="reading-highlight">卡点和盲区</span>。`;
  }

  // ===== 2. NARRATIVE (card interaction) =====
  let narrative = '';
  if (sp === SPREADS.triple) {
    // Past → Present → Future flow
    const [past, now, future] = cards;
    const pastUpright = !past.reversed, nowUpright = !now.reversed, futureUpright = !future.reversed;

    narrative += `从<span style="color:var(--purple);">过去</span>的「${past.name}」（${pastUpright?'正位':'逆位'}）`;
    narrative += `走向<span style="color:var(--purple);">现在</span>的「${now.name}」（${nowUpright?'正位':'逆位'}）`;

    if (pastUpright && nowUpright) {
      narrative += `——过去的积累为当下奠定了良好基础，两股正向能量衔接顺畅，你正处在一个顺势而为的阶段。`;
    } else if (!pastUpright && nowUpright) {
      narrative += `——虽然过去存在坎坷和阻力，但你已经走出了那个阶段，现在的能量正在好转。过去的教训成为了今日的智慧。`;
    } else if (pastUpright && !nowUpright) {
      narrative += `——过去的顺遂让你习惯了某种模式，但当前出现了需要你重新审视的信号。逆位的「${now.name}」不是否定，而是提醒：旧的方法可能不再适用。`;
    } else {
      narrative += `——两段能量都处于调整期，提示你正经历一个内在转型的过程。这不是低谷，而是蜕变的前奏。`;
    }

    narrative += `<br><br>展望<span style="color:var(--purple);">未来</span>——「${future.name}」（${futureUpright?'正位':'逆位'}）」`;
    if (futureUpright) {
      narrative += `预示着一个积极的发展方向。当下「${now.name}」的能量如果被善用，将自然导向「${future.name}」的成果。`;
    } else {
      narrative += `提示了潜在的风险或需要调整的方向。现在修正「${now.name}」中的模式，就能改写未来的走向——塔罗从不预言不可更改的命运。`;
    }
  } else if (sp === SPREADS.relation) {
    // Relationship spread - compare both sides
    const youCards = cards.slice(0,3), themCards = cards.slice(3,6), outcome = cards[6];
    const youRevs = youCards.filter(c=>c.reversed).length;
    const themRevs = themCards.filter(c=>c.reversed).length;

    narrative += `你这一侧，`;
    narrative += `感受层是「${youCards[0].name}」、想法层是「${youCards[1].name}」、行为层是「${youCards[2].name}」。`;
    if (youRevs >= 2) narrative += `你的能量有较多内在纠结，感受与行为之间可能存在不一致——心里想的和实际做的有差距。`;
    else if (youRevs === 1) narrative += `你的能量大体清晰，但有一处需要梳理的卡点。`;
    else narrative += `你的能量清晰流畅，内在感受与外在表达一致。`;

    narrative += `<br><br>对方一侧，`;
    narrative += `感受层是「${themCards[0].name}」、想法层是「${themCards[1].name}」、行为层是「${themCards[2].name}」。`;
    if (themRevs >= 2) narrative += `对方的能量也存在较多波动和不确定性，可能尚未理清自己的位置。`;
    else if (themRevs === 1) narrative += `对方的能量大致明确，只有一个层面需要进一步观察。`;
    else narrative += `对方的能量状态较为明朗。`;

    narrative += `<br><br>两方对比：`;
    if (youRevs > themRevs) narrative += `你的内在波动比对方更多，建议先稳定自己的内心，不急于在关系中求解。`;
    else if (themRevs > youRevs) narrative += `对方似乎比你更不确定——给对方一些空间，让答案自然浮现。`;
    else narrative += `两人的能量状态相似，都在同一频道上，这有助于相互理解和共振。`;

    narrative += `<br><br>关系走向「${outcome.name}」（${outcome.reversed?'逆位':'正位'}）——`;
    if (!outcome.reversed) {
      narrative += `整体趋势向好，但关系的质量取决于两人当下的真实投入，而非牌面的承诺。`;
    } else {
      narrative += `提示关系中存在需要正视的问题。逆位不是"坏结局"，而是邀请你们面对一直回避的议题。`;
    }
  } else if (sp === SPREADS.star) {
    // Star spread - connect core to outcome
    const core = cards[0], challenge = cards[1], root = cards[2];
    const vision = cards[3], past = cards[4], near = cards[5], outcome = cards[6];

    narrative += `核心问题由<span class="reading-highlight">「${core.name}」</span>定义`;
    narrative += `（${core.reversed?'逆位提示你需要向内审视这个议题的本源':'正位表明你已经清晰地看到了问题的本质'}）。`;

    narrative += `<br><br>挑战层的「${challenge.name}」${challenge.reversed?'以逆位出现，说明阻力可能来自内在的恐惧而非外在的困难':'提示这是你必须正面应对的成长关卡'}。`;
    narrative += `而根基层的「${root.name}」揭示了潜在的驱动力——${root.reversed?'某些未被意识到的模式正在暗中影响你的判断':'你可以清晰地追溯到问题的源头，这是宝贵的觉察'}。`;

    narrative += `<br><br>从<span style="color:var(--purple);">远景</span>「${vision.name}」到<span style="color:var(--purple);">近期未来</span>「${near.name}」，再到<span style="color:var(--purple);">最终结果</span>「${outcome.name}」——`;
    if (!outcome.reversed) {
      narrative += `这条路径指向一个值得期待的方向，但需要你主动跨越「${challenge.name}」所代表的障碍。`;
    } else {
      narrative += `结果牌以逆位呈现，提醒你某些假设可能需要被重新检验。回到核心牌「${core.name}」——你对问题的定义是否准确？换个角度思考，答案会不同。`;
    }
  } else {
    // Single card spread
    const card = cards[0];
    narrative += `今天的核心启示来自<span class="reading-highlight">「${card.name}」</span>`;
    narrative += `（${card.reversed?'逆位':'正位'}）——`;
    if (card.type === 'major') {
      narrative += `作为大阿卡纳，这张牌携带了强大的原型能量。`;
    } else {
      const sData = MINOR_ARCANA[card.suit];
      narrative += `属于${sData.suit}牌组（${sData.el}元素），触及${sData.domain}的领域。`;
    }
    narrative += `${card.reversed ? '逆位邀请你向内看——这份能量被什么阻挡了？' : '正位鼓励你拥抱这份能量，让它引领你前行。'}`;
  }

  // ===== 3. ACTIONS =====
  let actions = '';
  const actionPool = [];

  // Element-based
  if (dominantEl[0] === '火') {
    actionPool.push('🔥 行动力旺盛的时期，但要避免冲动。行动前问自己：这出于热情还是焦虑？');
    actionPool.push('🔥 将多余的火能量用于运动或创造性项目，让火焰有出口而非内耗。');
  } else if (dominantEl[0] === '水') {
    actionPool.push('💧 允许情绪流淌，但不被情绪淹没。写日记或与信任的人交谈有助于梳理感受。');
    actionPool.push('💧 直觉此刻非常敏锐——留意梦、巧合和内心的"第一反应"。');
  } else if (dominantEl[0] === '风') {
    actionPool.push('🍃 思维活跃时容易过度分析。本周设定一个"停止思考、开始行动"的截止时间。');
    actionPool.push('🍃 注意言语的力量——你想说的话，是真的需要说，还是仅仅想要赢？');
  } else if (dominantEl[0] === '土') {
    actionPool.push('🪨 稳扎稳打是你的优势，但别让"求稳"变成"不动"。给自己设定一个小的行动目标。');
    actionPool.push('🪨 关注身体健康和财务细节——这是打好地基的时期，每一步都算数。');
  }

  // Reversal-based
  if (revRatio > 0.4) {
    actionPool.push('🔄 逆位牌较多时，建议减少外在行动，增加内在整理。冥想、散步、自由书写都是好工具。');
  }
  if (revRatio === 0) {
    actionPool.push('✨ 全正位——能量通畅，是行动的好时机。但仍需谨慎决策，正位不代表"自动成功"。');
  }

  // Scenario-based
  const scActions = {
    life: '🧭 本周做一件"愚者"式的小冒险：走一条新路、学一样新东西、对未知保持好奇。',
    love: '💔 如果你在关系中——这周专注倾听而非表达。如果你在寻找——先成为你希望吸引的那个人。',
    career: '💼 列出三个你真正擅长且享受的事情，然后看看它们是否与当前的工作方向一致。',
    money: '💰 做一次"金钱信念检查"——你对钱的真实感受是什么？丰盈的还是匮乏的？这些信念来自哪里？',
    spirit: '🧘 每天留出10分钟的沉默时间——没有手机、没有任务、没有目的。只是存在。',
    health: '🏥 身体是心灵的镜子——注意最近反复出现的身体小信号，它们在诉说什么？'
  };
  actionPool.push(scActions[state.scenario] || '');

  // Pick 3-4 most relevant actions
  const selected = actionPool.filter(Boolean).slice(0, 4);
  actions = selected.map((a, i) => `${i+1}. ${a}`).join('<br>');

  // ===== 4. CLOSING =====
  const closings = [
    '✨ 塔罗牌是一面镜子，映照出你早已知道却尚未承认的真相。最终的决策权永远在你手中。保持开放，保持觉察，相信自己的内在智慧。',
    '🌙 无论牌面揭示了什么——光明或阴影、顺遂或挑战——它们都是你生命旅程的一部分。真正的占卜不是预知未来，而是被未来提问：你准备好了吗？',
    '🌟 每一张牌都是一扇门，通向一个可能的视角。今天你打开了几扇？明天你将选择走进哪一扇？答案不在牌中，在你走向答案的路上。',
    '💫 感谢你花时间与自己对话。在这个向外追逐的世界里，愿意向内看的人，已经走出了最重要的一步。'
  ];
  const closing = closings[Math.floor(Math.random() * closings.length)];

  return { overview, narrative, actions, closing };
}

function resetDraw() {
  document.getElementById('shuffleArea').style.display = '';
  const deck = document.getElementById('shuffleDeck');
  deck.classList.remove('animating');
  startDraw();
}

// ==================== INIT ====================
function init() {
  renderScenarios(); // pre-render
}
init();
</script>
